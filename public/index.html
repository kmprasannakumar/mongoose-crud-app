<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User API Test</title>
</head>
<body>
  <h1>Create User</h1>
  <button onclick="createUser()">Create Sample User</button>

  <script>
    function createUser() {
      fetch("http://localhost:3000/api/users", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          name: "John Doe",
          email: "john@example.com",
          age: 25
        })
      })
      .then(res => res.json())
      .then(data => {
        console.log("User Created:", data);
        alert("User Created! Check console.");
      })
      .catch(err => console.error("Error:", err));
    }
  </script>
</body>
</html>
